apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: services-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: random.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: random-service
            port:
              number: 80

  - host: hash.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hash-service
            port:
              number: 80
  - host: prometheus.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prometheus-server
            port:
              number: 80